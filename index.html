<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scratch & Win</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      padding: 30px 16px;
      gap: 0;
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 28px; }
    .header h1 {
      font-size: 2.2rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ffd700;
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
    }
    .header p {
      font-size: 0.95rem;
      color: #aaa;
      margin-top: 6px;
      letter-spacing: 1px;
    }

    /* ── Step labels ── */
    .step-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #ffd700aa;
      margin-bottom: 10px;
      align-self: flex-start;
      padding-left: 2px;
    }

    /* ── Category Grid ── */
    .category-section { width: 100%; max-width: 460px; margin-bottom: 24px; }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .cat-btn {
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 14px 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      transition: all 0.2s ease;
      color: white;
    }
    .cat-btn:hover {
      background: rgba(255,215,0,0.1);
      border-color: #ffd70060;
      transform: translateY(-2px);
    }
    .cat-btn.active {
      background: rgba(255,215,0,0.15);
      border-color: #ffd700;
      box-shadow: 0 0 18px rgba(255,215,0,0.25);
    }
    .cat-btn .cat-icon { font-size: 1.8rem; line-height: 1; }
    .cat-btn .cat-name { font-size: 0.78rem; font-weight: 600; letter-spacing: 0.5px; color: #ddd; }
    .cat-btn.active .cat-name { color: #ffd700; }

    /* ── Prize Chips ── */
    .prize-section { width: 100%; max-width: 460px; margin-bottom: 26px; }

    .prize-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 50px;
      padding: 7px 18px;
      font-size: 0.85rem;
      font-weight: 700;
      color: #ccc;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }

    .chip.highlight {
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      border-color: transparent;
      color: #1a1a1a;
      box-shadow: 0 4px 14px rgba(255,165,0,0.4);
      transform: scale(1.05);
    }

    .prize-placeholder {
      font-size: 0.85rem;
      color: #555;
      font-style: italic;
    }

    /* ── Card wrapper ── */
    .card-section { width: 100%; max-width: 460px; margin-bottom: 20px; }

    .card-wrapper {
      position: relative;
      width: 100%;
      height: 200px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 3px #ffd700;
      overflow: hidden;
    }

    /* dimmed before category selected */
    .card-wrapper.locked { filter: brightness(0.4); pointer-events: none; }

    /* ── Prize layer ── */
    .prize-layer {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
      border-radius: 20px;
      gap: 4px;
    }
    .prize-cat-tag {
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #888;
    }
    .prize-icon-big { font-size: 2rem; line-height: 1; }
    .prize-amount {
      font-size: 4.2rem;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #ffd700, #ff8c00, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 12px rgba(255,215,0,0.6));
    }
    .prize-sublabel { font-size: 0.85rem; color: #ffd70099; letter-spacing: 2px; }

    /* ── Scratch canvas ── */
    canvas#scratchCanvas {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      cursor: crosshair;
      touch-action: none;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 460px;
    }
    button.action-btn {
      flex: 1;
      padding: 13px 10px;
      border: none;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    }
    button.action-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none !important;
    }
    button.action-btn:not(:disabled):hover { transform: translateY(-2px); }
    button.action-btn:not(:disabled):active { transform: translateY(0); }

    #revealBtn {
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #1a1a1a;
      box-shadow: 0 6px 20px rgba(255,215,0,0.35);
    }
    #resetBtn {
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
    }
    #resetBtn:not(:disabled):hover { background: rgba(255,255,255,0.15); }

    /* ── Win message ── */
    .win-message {
      margin-top: 20px;
      font-size: 1.25rem;
      font-weight: 700;
      color: #ffd700;
      letter-spacing: 1.5px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      text-shadow: 0 0 16px rgba(255,215,0,0.6);
      text-align: center;
      min-height: 30px;
    }
    .win-message.show { opacity: 1; transform: translateY(0); }

    /* ── Confetti ── */
    #confettiCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }
  </style>
</head>
<body>

<canvas id="confettiCanvas"></canvas>

<div class="header">
  <h1>🎟 Scratch &amp; Win</h1>
  <p>Pick a category, then scratch your card!</p>
</div>

<!-- STEP 1 – Category -->
<div class="category-section">
  <div class="step-label">① Choose a Category</div>
  <div class="category-grid" id="categoryGrid"></div>
</div>

<!-- STEP 2 – Prize preview -->
<div class="prize-section">
  <div class="step-label">② Possible Prizes</div>
  <div class="prize-chips" id="prizeChips">
    <span class="prize-placeholder">Select a category to see prizes…</span>
  </div>
</div>

<!-- STEP 3 – Scratch Card -->
<div class="card-section">
  <div class="step-label">③ Scratch to Reveal</div>
  <div class="card-wrapper locked" id="cardWrapper">
    <div class="prize-layer" id="prizeLayer">
      <div class="prize-cat-tag"  id="prizeCatTag">—</div>
      <div class="prize-icon-big" id="prizeIconBig"></div>
      <div class="prize-amount"   id="prizeAmount">—</div>
      <div class="prize-sublabel" id="prizeSublabel"></div>
    </div>
    <canvas id="scratchCanvas" width="460" height="200"></canvas>
  </div>
</div>

<div class="btn-row">
  <button class="action-btn" id="revealBtn" disabled>✨ Reveal All</button>
  <button class="action-btn" id="resetBtn"  disabled>🔄 New Card</button>
</div>

<div class="win-message" id="winMessage"></div>

<script>
  // ════════════════════════════════════════════════
  //  🏷️  PRIZE CONFIG  — Add / edit categories here
  // ════════════════════════════════════════════════
  const PRIZE_CONFIG = {
    ac: {
      label:   "AC",
      icon:    "🌬️",
      color:   "#00cfff",
      sublabel: "OFF on AC",
      prizes: [
        { value: "₹2,000 OFF",  weight: 50 },
        { value: "₹5,000 OFF",  weight: 30 },
        { value: "₹10,000 OFF", weight: 20 },
      ],
    },
    tv: {
      label:   "TV",
      icon:    "📺",
      color:   "#a78bfa",
      sublabel: "OFF on TV",
      prizes: [
        { value: "₹1,500 OFF", weight: 50 },
        { value: "₹3,000 OFF", weight: 30 },
        { value: "₹7,000 OFF", weight: 20 },
      ],
    },
    phone: {
      label:   "Phone",
      icon:    "📱",
      color:   "#34d399",
      sublabel: "OFF on Phone",
      prizes: [
        { value: "₹500 OFF",   weight: 50 },
        { value: "₹1,000 OFF", weight: 35 },
        { value: "₹3,000 OFF", weight: 15 },
      ],
    },
    giftcard: {
      label:   "Gift Card",
      icon:    "🎁",
      color:   "#f472b6",
      sublabel: "Gift Card",
      prizes: [
        { value: "$25",  weight: 50 },
        { value: "$50",  weight: 35 },
        { value: "$100", weight: 15 },
      ],
    },
    cash: {
      label:   "Cash",
      icon:    "💰",
      color:   "#fbbf24",
      sublabel: "Cash Back",
      prizes: [
        { value: "$10", weight: 50 },
        { value: "$20", weight: 35 },
        { value: "$50", weight: 15 },
      ],
    },
    travel: {
      label:   "Travel",
      icon:    "✈️",
      color:   "#fb923c",
      sublabel: "Travel Voucher",
      prizes: [
        { value: "$100 Voucher", weight: 50 },
        { value: "$250 Voucher", weight: 30 },
        { value: "$500 Voucher", weight: 20 },
      ],
    },
  };

  // ════════════════════════════════════════════════
  //  ⚙️  SETTINGS
  // ════════════════════════════════════════════════
  const BRUSH_SIZE        = 36;
  const REVEAL_THRESHOLD  = 0.55;

  // ════════════════════════════════════════════════
  //  🔧  STATE
  // ════════════════════════════════════════════════
  let selectedCategory = null;
  let currentPrize     = null;
  let isDrawing        = false;
  let revealed         = false;
  let confettiAnim     = null;

  // ════════════════════════════════════════════════
  //  🎯  ELEMENT REFS
  // ════════════════════════════════════════════════
  const scratchCanvas  = document.getElementById('scratchCanvas');
  const ctx            = scratchCanvas.getContext('2d');
  const cardWrapper    = document.getElementById('cardWrapper');
  const prizeAmount    = document.getElementById('prizeAmount');
  const prizeCatTag    = document.getElementById('prizeCatTag');
  const prizeIconBig   = document.getElementById('prizeIconBig');
  const prizeSublabel  = document.getElementById('prizeSublabel');
  const winMessage     = document.getElementById('winMessage');
  const prizeChips     = document.getElementById('prizeChips');
  const categoryGrid   = document.getElementById('categoryGrid');
  const confettiCanvas = document.getElementById('confettiCanvas');
  const cCtx           = confettiCanvas.getContext('2d');
  const revealBtn      = document.getElementById('revealBtn');
  const resetBtn       = document.getElementById('resetBtn');

  // ════════════════════════════════════════════════
  //  🏗️  BUILD CATEGORY BUTTONS
  // ════════════════════════════════════════════════
  Object.entries(PRIZE_CONFIG).forEach(([key, cat]) => {
    const btn = document.createElement('button');
    btn.className   = 'cat-btn';
    btn.dataset.key = key;
    btn.innerHTML   = `<span class="cat-icon">${cat.icon}</span>
                       <span class="cat-name">${cat.label}</span>`;
    btn.addEventListener('click', () => selectCategory(key));
    categoryGrid.appendChild(btn);
  });

  // ════════════════════════════════════════════════
  //  🎯  WEIGHTED RANDOM PICK
  //  Object lookup table used here — O(1) access
  // ════════════════════════════════════════════════
  function pickWeightedPrize(categoryKey) {
    const prizes = PRIZE_CONFIG[categoryKey].prizes;   // direct lookup ✅
    const totalWeight = prizes.reduce((sum, p) => sum + p.weight, 0);
    let rand = Math.random() * totalWeight;
    for (const prize of prizes) {
      rand -= prize.weight;
      if (rand <= 0) return prize.value;
    }
    return prizes[prizes.length - 1].value;
  }

  // ════════════════════════════════════════════════
  //  🗂️  SELECT CATEGORY
  // ════════════════════════════════════════════════
  function selectCategory(key) {
    selectedCategory = key;
    const cat = PRIZE_CONFIG[key];

    // Highlight active button
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-key="${key}"]`).classList.add('active');

    // Show prize chips
    prizeChips.innerHTML = cat.prizes.map((p, i) => `
      <span class="chip" data-index="${i}">${cat.icon} ${p.value}</span>
    `).join('');

    // Reset & init card
    initCard();
  }

  // ════════════════════════════════════════════════
  //  🃏  INIT CARD
  // ════════════════════════════════════════════════
  function initCard() {
    if (!selectedCategory) return;

    const cat   = PRIZE_CONFIG[selectedCategory];
    currentPrize = pickWeightedPrize(selectedCategory);
    revealed     = false;

    // Update prize layer
    prizeAmount.textContent   = currentPrize;
    prizeCatTag.textContent   = cat.label;
    prizeIconBig.textContent  = cat.icon;
    prizeSublabel.textContent = cat.sublabel;
    prizeAmount.style.background = `linear-gradient(135deg, ${cat.color}, #ff8c00, ${cat.color})`;
    prizeAmount.style.webkitBackgroundClip = 'text';
    prizeAmount.style.backgroundClip       = 'text';

    // Unlock card
    cardWrapper.classList.remove('locked');

    // Reset UI
    winMessage.classList.remove('show');
    winMessage.textContent = '';
    revealBtn.disabled = false;
    resetBtn.disabled  = false;

    // Clear highlighted chips
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('highlight'));

    // Stop old confetti
    if (confettiAnim) { cancelAnimationFrame(confettiAnim); confettiAnim = null; }
    cCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);

    // Sync canvas size to rendered size
    const rect = scratchCanvas.getBoundingClientRect();
    scratchCanvas.width  = rect.width  || 460;
    scratchCanvas.height = rect.height || 200;

    drawScratchLayer();
  }

  // ════════════════════════════════════════════════
  //  🪙  DRAW SILVER SCRATCH LAYER
  // ════════════════════════════════════════════════
  function drawScratchLayer() {
    const W = scratchCanvas.width;
    const H = scratchCanvas.height;

    ctx.globalCompositeOperation = 'source-over';

    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0,   '#b0b0b0');
    grad.addColorStop(0.3, '#e0e0e0');
    grad.addColorStop(0.5, '#f5f5f5');
    grad.addColorStop(0.7, '#cccccc');
    grad.addColorStop(1,   '#a0a0a0');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Dot pattern
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    for (let x = 10; x < W; x += 18) {
      for (let y = 10; y < H; y += 18) {
        ctx.beginPath();
        ctx.arc(x, y, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Category label on scratch layer
    if (selectedCategory) {
      const cat = PRIZE_CONFIG[selectedCategory];
      ctx.font      = 'bold 15px Segoe UI';
      ctx.fillStyle = 'rgba(80,80,80,0.5)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(`${cat.icon}  ${cat.label.toUpperCase()} SCRATCH CARD  ${cat.icon}`, W/2, H/2 - 14);
    }

    ctx.font      = 'bold 20px Segoe UI';
    ctx.fillStyle = 'rgba(60,60,60,0.8)';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🪙  SCRATCH HERE  🪙', scratchCanvas.width/2, scratchCanvas.height/2 + 14);
  }

  // ════════════════════════════════════════════════
  //  ✏️  SCRATCH HELPERS
  // ════════════════════════════════════════════════
  function getPos(e) {
    const rect  = scratchCanvas.getBoundingClientRect();
    const scaleX = scratchCanvas.width  / rect.width;
    const scaleY = scratchCanvas.height / rect.height;
    const src   = e.touches ? e.touches[0] : e;
    return {
      x: (src.clientX - rect.left) * scaleX,
      y: (src.clientY - rect.top)  * scaleY,
    };
  }

  function scratchAt(x, y) {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x, y, BRUSH_SIZE, 0, Math.PI * 2);
    ctx.fill();
  }

  function getScratchedPercent() {
    const pixels = ctx.getImageData(0, 0, scratchCanvas.width, scratchCanvas.height).data;
    let cleared  = 0;
    for (let i = 3; i < pixels.length; i += 4) {
      if (pixels[i] === 0) cleared++;
    }
    return cleared / (scratchCanvas.width * scratchCanvas.height);
  }

  // ════════════════════════════════════════════════
  //  🎉  REVEAL
  // ════════════════════════════════════════════════
  function revealAll() {
    if (revealed || !selectedCategory) return;
    revealed = true;
    ctx.clearRect(0, 0, scratchCanvas.width, scratchCanvas.height);
    highlightWinningChip();
    showWinMessage();
    launchConfetti();
  }

  function highlightWinningChip() {
    const cat = PRIZE_CONFIG[selectedCategory];
    const idx = cat.prizes.findIndex(p => p.value === currentPrize);
    const chips = document.querySelectorAll('.chip');
    if (chips[idx]) chips[idx].classList.add('highlight');
  }

  function showWinMessage() {
    const cat = PRIZE_CONFIG[selectedCategory];
    winMessage.textContent = `${cat.icon}  You won ${currentPrize} on ${cat.label}!  ${cat.icon}`;
    winMessage.classList.add('show');
  }

  // ════════════════════════════════════════════════
  //  🖱️  EVENTS
  // ════════════════════════════════════════════════
  scratchCanvas.addEventListener('mousedown', e => {
    if (revealed) return; isDrawing = true; const {x,y} = getPos(e); scratchAt(x, y);
  });
  scratchCanvas.addEventListener('mousemove', e => {
    if (!isDrawing || revealed) return; const {x,y} = getPos(e); scratchAt(x, y);
    if (getScratchedPercent() >= REVEAL_THRESHOLD) revealAll();
  });
  scratchCanvas.addEventListener('mouseup',    () => isDrawing = false);
  scratchCanvas.addEventListener('mouseleave', () => isDrawing = false);

  scratchCanvas.addEventListener('touchstart', e => {
    e.preventDefault(); if (revealed) return; isDrawing = true;
    const {x,y} = getPos(e); scratchAt(x, y);
  }, { passive: false });
  scratchCanvas.addEventListener('touchmove', e => {
    e.preventDefault(); if (!isDrawing || revealed) return;
    const {x,y} = getPos(e); scratchAt(x, y);
    if (getScratchedPercent() >= REVEAL_THRESHOLD) revealAll();
  }, { passive: false });
  scratchCanvas.addEventListener('touchend', () => isDrawing = false);

  revealBtn.addEventListener('click', revealAll);
  resetBtn.addEventListener('click',  initCard);

  // ════════════════════════════════════════════════
  //  🎊  CONFETTI
  // ════════════════════════════════════════════════
  function launchConfetti() {
    confettiCanvas.width  = window.innerWidth;
    confettiCanvas.height = window.innerHeight;

    const cat       = PRIZE_CONFIG[selectedCategory];
    const baseColor = cat.color;

    const particles = Array.from({ length: 180 }, () => ({
      x:     Math.random() * confettiCanvas.width,
      y:     Math.random() * confettiCanvas.height - confettiCanvas.height,
      w:     Math.random() * 10 + 6,
      h:     Math.random() * 6  + 4,
      color: Math.random() > 0.4 ? baseColor : `hsl(${Math.random()*360},90%,65%)`,
      rot:   Math.random() * Math.PI * 2,
      rotV:  (Math.random() - 0.5) * 0.15,
      vy:    Math.random() * 3 + 2,
      vx:    (Math.random() - 0.5) * 2,
    }));

    function draw() {
      cCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      let alive = false;
      particles.forEach(p => {
        p.y += p.vy; p.x += p.vx; p.rot += p.rotV;
        if (p.y < confettiCanvas.height + 20) alive = true;
        cCtx.save();
        cCtx.translate(p.x + p.w / 2, p.y + p.h / 2);
        cCtx.rotate(p.rot);
        cCtx.fillStyle = p.color;
        cCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        cCtx.restore();
      });
      if (alive) confettiAnim = requestAnimationFrame(draw);
      else cCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    }
    draw();
  }
</script>
</body>
</html>
